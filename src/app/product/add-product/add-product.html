<div class="container mt-3">
  <div class="card">
    <div class="card-header">
      <h2>{{ mode === 'add' ? 'Add' : 'Update' }} Product</h2>
    </div>
    <div class="card-body">
      <form>
        <div class="mb-3 mt-3">
          <label class="form-label">Name:</label>
          <input type="text" class="form-control" [(ngModel)]="product.name" name="name">
        </div>
        <div class="mb-3">
          <label class="form-label">Price:</label>
          <input type="text" class="form-control" [(ngModel)]="product.price" name="price">
        </div>
        <button type="submit" class="btn btn-dark" (click)="submitForm()">{{ mode === 'add' ? 'Add' : 'Update' }}</button>
      </form>
    </div>
  </div>
</div>
